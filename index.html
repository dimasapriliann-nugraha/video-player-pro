<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Video Player Pro - Mobile Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-secondary: #12121a;
      --fg: #e8e8ed;
      --muted: #6b6b7a;
      --accent: #00ff88;
      --accent-dim: #00cc6a;
      --card: #1a1a24;
      --border: #2a2a38;
      --danger: #ff4757;
      --warning: #ffa502;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* Latar Belakang */
    .bg-atmosphere {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .bg-atmosphere::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(ellipse at 20% 20%, rgba(0, 255, 136, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(0, 200, 100, 0.05) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, rgba(30, 30, 50, 0.5) 0%, transparent 70%);
      animation: bgFloat 20s ease-in-out infinite;
    }
    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, 2%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-1deg); }
    }

    /* Penyesuaian Mobile: Hapus max-width, bikin full */
    .mobile-container {
      width: 100%;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Container Utama Video */
    .video-container {
      position: relative;
      background: #000;
      border-radius: 12px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--border);
      transition: all 0.3s ease;
    }

    /* FULLSCREEN CSS - Penting agar fiturnya tetap bawaan pas landscape */
    .video-container:fullscreen {
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0;
      box-shadow: none;
    }
    .video-container:fullscreen .video-wrapper {
      height: 100vh;
      aspect-ratio: auto !important;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mainVideo {
      width: 100%;
      height: 100%;
      display: block;
      transition: filter 0.3s ease;
      object-fit: contain;
    }

    /* Overlay Control */
    .controls-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.4) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
    }
    .video-container.show-controls .controls-overlay { opacity: 1; }

    /* Center Play/Pause Auto-hide */
    .center-play {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      width: 60px; height: 60px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: all 0.3s ease; z-index: 10;
      pointer-events: none;
    }
    .video-container.show-controls .center-play.paused-state {
      opacity: 1; transform: translate(-50%, -50%) scale(1);
    }
    .center-play.tap-anim {
      opacity: 1; transform: translate(-50%, -50%) scale(1.2);
    }
    .center-play svg { width: 24px; height: 24px; fill: var(--accent); margin-left: 4px; }
    .center-play.playing svg { margin-left: 0; }

    /* Progress Bar */
    .progress-container {
      position: relative; width: 100%; height: 8px;
      background: rgba(255,255,255,0.2); border-radius: 4px;
      margin-bottom: 12px;
    }
    .progress-bar {
      position: absolute; left: 0; top: 0; height: 100%;
      background: var(--accent); border-radius: 4px;
    }
    .progress-buffer {
      position: absolute; left: 0; top: 0; height: 100%;
      background: rgba(255,255,255,0.3); border-radius: 4px;
    }

    /* Tombol Control */
    .controls-row {
      display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    }
    .controls-left, .controls-right { display: flex; align-items: center; gap: 8px; }
    
    .control-btn {
      background: transparent; color: var(--fg); border: none;
      padding: 6px; cursor: pointer; transition: color 0.2s;
    }
    .control-btn:active { color: var(--accent); transform: scale(0.9); }
    .control-btn svg { width: 22px; height: 22px; }
    .control-btn .btn-text { display: none; } /* Sembunyikan teks di mobile */

    .time-display { font-size: 11px; color: var(--fg); margin-left: 4px; font-weight: 500;}

    /* Panel List & Info */
    .side-panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin-bottom: 12px;
    }
    .panel-title {
      font-weight: 600; font-size: 14px; margin-bottom: 12px;
      color: var(--accent); display: flex; align-items: center; gap: 8px;
    }

    /* Playlist */
    .playlist-item {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 8px; cursor: pointer;
    }
    .playlist-item.playing { border-color: var(--accent); background: rgba(0,255,136,0.1); }
    .playlist-thumb { width: 70px; height: 40px; border-radius: 4px; overflow: hidden; position: relative;}
    .playlist-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .playlist-title { font-size: 12px; font-weight: 500; }

    /* Filters (Ditampilkan agar gampang diakses) */
    .filter-slider { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .filter-slider label { width: 60px; font-size: 11px; color: var(--muted); }
    .filter-slider input { flex: 1; height: 4px; background: rgba(255,255,255,0.2); -webkit-appearance: none; border-radius: 2px;}
    .filter-slider input::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; }
    .filter-value { width: 36px; font-size: 10px; color: var(--accent); text-align: right; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--accent); padding: 10px 16px; border-radius: 8px; font-size: 12px; z-index: 1000; animation: toastAnim 3s forwards; }
    @keyframes toastAnim { 0% { opacity: 0; bottom: 0; } 10% { opacity: 1; bottom: 20px; } 90% { opacity: 1; bottom: 20px; } 100% { opacity: 0; bottom: 0; } }
  </style>
</head>
<body>
  <div class="bg-atmosphere"></div>

  <div class="relative z-10 mobile-container">
    <header class="mb-2">
      <h1 class="text-xl font-bold">Video Player <span style="color: var(--accent);">Pro</span></h1>
      <p class="text-xs" style="color: var(--muted);">Mobile Optimized & Auto Landscape</p>
    </header>

    <div class="video-container show-controls" id="videoContainer">
      <div class="video-wrapper" id="videoWrapper">
        <video id="mainVideo" playsinline preload="metadata">
          <source src="https://ik.imagekit.io/u9q17rr6m/YTMP3GG_YouTube_Sesi-Potret-en-au-feat-Ari-Lesmana-lyric_Media_9TUigcdqEFA_001_1080p.mp4" type="video/mp4">
        </video>

        <div class="center-play paused-state" id="centerPlay">
          <svg viewBox="0 0 24 24" id="centerPlayIcon">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </div>

        <div class="controls-overlay" id="controlsOverlay">
          <div class="progress-container" id="progressContainer">
            <div class="progress-buffer" id="progressBuffer"></div>
            <div class="progress-bar" id="progressBar"></div>
          </div>

          <div class="controls-row">
            <div class="controls-left">
              <button class="control-btn" id="playBtn">
                <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><polygon points="5,3 19,12 5,21"/></svg>
              </button>
              <button class="control-btn" id="skipBackBtn">
                 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5V1L7 6l5 5V7a6 6 0 0 1 6 6 6 6 0 0 1-6 6 6 6 0 0 1-6-6H4a8 8 0 0 0 8 8 8 8 0 0 0 8-8 8 8 0 0 0-8-8z"/></svg>
              </button>
              <button class="control-btn" id="skipForwardBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5V1l5 5-5 5V7a6 6 0 0 0-6 6 6 6 0 0 0 6 6 6 6 0 0 0 6-6h2a8 8 0 0 1-8 8 8 8 0 0 1-8-8 8 8 0 0 1 8-8z"/></svg>
              </button>
              <div class="time-display"><span id="currentTime">0:00</span> / <span id="duration">0:00</span></div>
            </div>
            <div class="controls-right">
              <button class="control-btn" id="autoNextBtn" style="color: var(--accent);">
                 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4v16l11-8L5 4z"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
              </button>
              <button class="control-btn" id="fullscreenBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel-title">Visual Filters</div>
      <div class="filter-slider"><label>Bright</label><input type="range" id="brightness" min="0" max="200" value="100"><span class="filter-value" id="brightnessVal">100%</span></div>
      <div class="filter-slider"><label>Contrast</label><input type="range" id="contrast" min="0" max="200" value="100"><span class="filter-value" id="contrastVal">100%</span></div>
      <div class="filter-slider"><label>Saturate</label><input type="range" id="saturation" min="0" max="200" value="100"><span class="filter-value" id="saturationVal">100%</span></div>
    </div>

    <div class="side-panel">
      <div class="panel-title">Detail Info Video</div>
      <div class="space-y-2 text-xs">
        <div class="flex justify-between"><span class="text-gray-400">Status</span><span class="mono" id="infoStatus" style="color: var(--accent);">Standby</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Resolusi Tampilan</span><span class="mono" id="infoResolution">-</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Orientasi Mode</span><span class="mono" id="infoOrientation">Portrait</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Sisa Durasi</span><span class="mono" id="infoTimeLeft">-</span></div>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel-title">Playlist</div>
      <div id="playlistList" style="max-height: 250px; overflow-y: auto;"></div>
    </div>
  </div>

  <footer><p class="text-center text-xs text-gray-500 py-4">&copy; 2026 DimasApriliann. Mobile Optimized.</p></footer>

  <script>
    const playlist = [
      { id: 1, title: 'Sesi Potret - eńau feat Ari Lesmana (lyrics)', src: 'https://ik.imagekit.io/7wup7a7xd/YTMP3GG_YouTube_Sesi-Potret-en-au-feat-Ari-Lesmana-lyric_Media_9TUigcdqEFA_001_1080p.mp4', duration: '3:56', thumb: 'https://files.catbox.moe/0lwqxg.jpg' },
      { id: 2, title: 'Mangu - Fourtwnty, Charita Utamy | Lirik Lagu', src: 'https://ik.imagekit.io/7wup7a7xd/YTMP3GG_YouTube_Mangu-Fourtwnty-Charita-Utamy-Lirik-Lagu_Media_Nrtsu_khShM_001_1080p.mp4', duration: '4:23', thumb: 'https://files.catbox.moe/zdltgq.png' },
      { id: 3, title: 'The 1975 - About You (Lyrics)', src: 'https://ik.imagekit.io/7wup7a7xd/YTMP3GG_YouTube_The-1975-About-You-Lyrics_Media_LZLZ36Vtah4_001_1080p.mp4', duration: '5:26', thumb: 'https://files.catbox.moe/oorldj.png' }
    ];

    let currentVideoIndex = 0;
    let isPlaying = false;
    let autoNext = true;
    let controlsTimeout;

    const video = document.getElementById('mainVideo');
    const videoContainer = document.getElementById('videoContainer');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const centerPlay = document.getElementById('centerPlay');
    const centerPlayIcon = document.getElementById('centerPlayIcon');
    const progressBar = document.getElementById('progressBar');
    const progressBuffer = document.getElementById('progressBuffer');
    const progressContainer = document.getElementById('progressContainer');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    
    // UI Format
    function formatTime(s) {
      if (isNaN(s)) return '0:00';
      return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    }
    function showToast(msg) {
      const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
      document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    }

    // PLAY/PAUSE LOGIC & AUTO HIDE
    function togglePlay() {
      if (video.paused) video.play(); else video.pause();
    }
    
    video.addEventListener('play', () => {
      isPlaying = true;
      playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      centerPlayIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      centerPlay.classList.remove('paused-state');
      document.getElementById('infoStatus').innerText = 'Playing';
      resetControlsTimeout();
    });

    video.addEventListener('pause', () => {
      isPlaying = false;
      playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
      centerPlayIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
      centerPlay.classList.add('paused-state');
      document.getElementById('infoStatus').innerText = 'Paused';
      videoContainer.classList.add('show-controls');
      clearTimeout(controlsTimeout);
    });

    // Tap Layar untuk Pause/Play & Animasi
    video.addEventListener('click', (e) => {
      e.stopPropagation();
      togglePlay();
      
      // Animasi kedip tombol tengah
      centerPlay.classList.remove('tap-anim');
      void centerPlay.offsetWidth; 
      centerPlay.classList.add('tap-anim');
      
      setTimeout(() => { centerPlay.classList.remove('tap-anim'); }, 300);
      resetControlsTimeout();
    });

    function resetControlsTimeout() {
      videoContainer.classList.add('show-controls');
      clearTimeout(controlsTimeout);
      if (isPlaying) {
        controlsTimeout = setTimeout(() => {
          videoContainer.classList.remove('show-controls');
        }, 2500); // UI Hilang setelah 2.5 detik
      }
    }
    videoContainer.addEventListener('touchstart', resetControlsTimeout);

    // AUTO ROTATE & FULLSCREEN LOGIC PENTING
    async function enforceFullscreenLandscape() {
      try {
        if (!document.fullscreenElement) await videoContainer.requestFullscreen();
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock("landscape");
        }
      } catch (err) { console.log("Lock orientation not supported on this device/browser.", err); }
    }

    async function exitFullscreenMobile() {
      try {
        if (document.fullscreenElement) await document.exitFullscreen();
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      } catch (err) {}
    }

    // Listener Device Rotation Asli
    window.addEventListener("orientationchange", function() {
      if (window.orientation === 90 || window.orientation === -90) {
        enforceFullscreenLandscape();
        document.getElementById('infoOrientation').innerText = 'Landscape';
      } else {
        exitFullscreenMobile();
        document.getElementById('infoOrientation').innerText = 'Portrait';
      }
    });

    // Tombol Fullscreen ditekan manual
    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) enforceFullscreenLandscape();
      else exitFullscreenMobile();
    });

    // Progress bar
    video.addEventListener('timeupdate', () => {
      if (!video.duration) return;
      progressBar.style.width = `${(video.currentTime / video.duration) * 100}%`;
      document.getElementById('currentTime').innerText = formatTime(video.currentTime);
      document.getElementById('infoTimeLeft').innerText = '-' + formatTime(video.duration - video.currentTime);
    });
    
    video.addEventListener('progress', () => {
      if (video.buffered.length > 0) {
        progressBuffer.style.width = `${(video.buffered.end(video.buffered.length-1) / video.duration) * 100}%`;
      }
    });

    progressContainer.addEventListener('click', (e) => {
      const rect = progressContainer.getBoundingClientRect();
      video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
    });

    document.getElementById('skipBackBtn').addEventListener('click', () => video.currentTime -= 10);
    document.getElementById('skipForwardBtn').addEventListener('click', () => video.currentTime += 10);

    // AUTO NEXT LOGIC
    document.getElementById('autoNextBtn').addEventListener('click', (e) => {
      autoNext = !autoNext;
      e.currentTarget.style.color = autoNext ? 'var(--accent)' : 'var(--fg)';
      showToast('Auto-Next: ' + (autoNext ? 'ON' : 'OFF'));
    });

    video.addEventListener('ended', () => {
      if (autoNext && currentVideoIndex < playlist.length - 1) loadVideo(currentVideoIndex + 1);
    });

    video.addEventListener('loadedmetadata', () => {
      document.getElementById('duration').innerText = formatTime(video.duration);
      document.getElementById('infoResolution').innerText = `${video.videoWidth}x${video.videoHeight}`;
    });

    // FILTERS
    const filters = { brightness: 100, contrast: 100, saturation: 100 };
    function applyFilters() {
      video.style.filter = `brightness(${filters.brightness}%) contrast(${filters.contrast}%) saturate(${filters.saturation}%)`;
    }
    ['brightness', 'contrast', 'saturation'].forEach(f => {
      document.getElementById(f).addEventListener('input', (e) => {
        filters[f] = e.target.value;
        document.getElementById(f+'Val').innerText = e.target.value + '%';
        applyFilters();
      });
    });

    // PLAYLIST RENDER
    function renderPlaylist() {
      document.getElementById('playlistList').innerHTML = playlist.map((p, i) => `
        <div class="playlist-item ${i === currentVideoIndex ? 'playing' : ''}" onclick="loadVideo(${i})">
          <div class="playlist-thumb"><img src="${p.thumb}"></div>
          <div class="playlist-title">${p.title}<br><span class="text-xs text-gray-500">${p.duration}</span></div>
        </div>
      `).join('');
    }

    function loadVideo(index) {
      currentVideoIndex = index;
      video.src = playlist[index].src;
      video.play();
      renderPlaylist();
      showToast('Memutar: ' + playlist[index].title);
    }

    playBtn.addEventListener('click', togglePlay);
    renderPlaylist();
  </script>
</body>
</html>
